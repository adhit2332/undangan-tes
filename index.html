<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Pernikahan Adhitya & Yesica</title>
  <style>
    body { font-family: 'Arial', sans-serif; background: #fdf6f0; text-align: center; padding: 20px; margin:0; }
    .card { background: white; padding: 25px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { color: #c0392b; margin-bottom: 5px; }
    h2 { color: #27ae60; margin-top: 0; }
    img { width: 100%; border-radius: 15px; margin: 15px 0; }
    .tanggal { margin: 20px 0; font-size: 18px; line-height: 1.6; }
    button { padding:14px 24px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold; font-size:16px; margin:10px 5px; cursor:pointer; }
    button:hover { opacity: 0.9; }
    input, select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 80%; margin: 5px 0; }
  </style>
</head>
<body>

<audio id="bgm" loop>
  <source src="bulan-ksatria.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>Undangan Pernikahan</h1>
  <h2>ADHITYA RIZKY & YESICA PUTRI</h2>
  
  <img src="https://files.catbox.moe/i3kk8y.jpg" alt="Foto">
  
  <p>Dengan memohon rahmat Allah SWT, kami mengundang Anda untuk hadir di acara pernikahan kami</p>
  
  <div class="tanggal">
    <b>Akad & Resepsi</b><br>
    Minggu, 20 Desember 2026<br>
    Gedung Serbaguna Jakarta
  </div>

  <button onclick="var a=document.getElementById('bgm'); a.paused ? a.play() : a.pause(); this.innerHTML = a.paused ? '🎵 Putar Musik' : '⏸️ Pause Musik'">
    🎵 Putar Musik
  </button>
  
  <h3>Hitung Mundur</h3>
  <div id="countdown"></div>

  <a href="https://maps.google.com/?q=Gedung+Serbaguna+Jakarta" target="_blank">
    <button style="background:#2980b9;">📍 Buka Maps</button>
  </a>

  <h3>Konfirmasi Kehadiran</h3>
  <input type="text" id="namaTamu" placeholder="Nama Anda"><br>
  <select id="status">
    <option value="Hadir">Hadir</option>
    <option value="Tidak Hadir">Tidak Hadir</option>
  </select><br>
  <button style="background:#8e44ad;" onclick="kirimRSVP()">Kirim</button>
  <p id="pesanRSVP" style="color:#27ae60; font-weight:bold;"></p>
</div>

<script>
const tanggalNikah = new Date("Dec 20, 2026 08:00:00").getTime();
setInterval(function() { 
  const now = new Date().getTime(); 
  const jarak = tanggalNikah - now; 
  const hari = Math.floor(jarak / (1000 * 60 * 60 * 24)); 
  const jam = Math.floor((jarak % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)); 
  const menit = Math.floor((jarak % (1000 * 60 * 60)) / (1000 * 60)); 
  const detik = Math.floor((jarak % (1000 * 60)) / 1000);
  document.getElementById("countdown").innerHTML = `
    <span style="display:inline-block; background:#c0392b; color:white; padding:10px; margin:5px; border-radius:8px; min-width:60px;">${hari}<br>Hari</span>
    <span style="display:inline-block; background:#c0392b; color:white; padding:10px; margin:5px; border-radius:8px; min-width:60px;">${jam}<br>Jam</span>
    <span style="display:inline-block; background:#c0392b; color:white; padding:10px; margin:5px; border-radius:8px; min-width:60px;">${menit}<br>Menit</span>
    <span style="display:inline-block; background:#c0392b; color:white; padding:10px; margin:5px; border-radius:8px; min-width:60px;">${detik}<br>Detik</span>
  `; 
}, 1000); 

function kirimRSVP() { 
  const nama = document.getElementById("namaTamu").value;
  const status = document.getElementById("status").value;
  if(nama === "") { alert("Isi nama dulu ya"); return; }
  document.getElementById("pesanRSVP").innerText = `Terima kasih ${nama}, konfirmasi: ${status}`; 
}
</script>

</body>
</html>
